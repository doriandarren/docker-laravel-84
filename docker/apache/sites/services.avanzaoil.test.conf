<VirtualHost *:80>
    ServerName services.avanzaoil.test
    DocumentRoot /var/www/projects/services.avanzaoil.eu/public

    <Directory /var/www/projects/services.avanzaoil.eu/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
